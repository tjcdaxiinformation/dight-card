<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJC 西區公關組 - 數位名片系統</title>
    
    <!-- 1. 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 載入 React 核心 (使用 cdnjs 提高連線速度) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 3. 載入 Babel (解析 JSX) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <!-- 4. 載入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; margin: 0; }
        
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .rendering-pixelated { image-rendering: pixelated; }

        /* 啟動動畫樣式 */
        #launch-loader {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s ease-out;
        }
        .spinner { 
            width: 50px; height: 50px; 
            border: 5px solid #f3f4f6; 
            border-top: 5px solid #4f46e5; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 避免在解析完成前看到原始代碼 */
        [script-type="text/babel"] { display: none; }
    </style>
</head>
<body>
    <!-- 初始載入層 -->
    <div id="launch-loader">
        <div class="spinner"></div>
        <p class="mt-4 text-slate-500 text-sm font-black tracking-widest uppercase">系統啟動中...</p>
        <p id="timeout-msg" class="mt-2 text-red-400 text-[10px] hidden font-bold">若載入過久，請檢查網路或重新整理頁面</p>
    </div>

    <div id="root"></div>

    <!-- 自動超時檢測 -->
    <script>
        setTimeout(() => {
            const msg = document.getElementById('timeout-msg');
            if (msg) msg.classList.remove('hidden');
        }, 8000);
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 安全提取圖示，增加容錯
        const getLucide = () => window.lucideReact || window.lucide || {};
        const { 
            ShieldCheck, RefreshCw, Globe, MessageCircle, 
            User, Monitor, Navigation, ExternalLink, Shield 
        } = getLucide();

        const App = () => {
            const [isFlipped, setIsFlipped] = useState(false);

            // 官方連結資料庫
            const qrLinks = {
                upload: "https://tjcdaxiinformation.github.io/TJC-West-History/",
                leader: "https://line.me/ti/p/U3XGjc8GKN", 
                ty: "https://line.me/ti/p/KKNk0Rh-8w",  
                hc: "https://line.me/ti/p/tlPkm568s6",  
                tc: "https://line.me/ti/p/f3ZInMWQhf",  
                nt: "https://line.me/ti/p/jmcEjbZ5UQ"     
            };

            useEffect(() => {
                // 渲染成功後關閉載入層
                const loader = document.getElementById('launch-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }, []);

            // QR Code 繪製組件
            const QRCodeItem = ({ url, label, size = 80, isDark = false }) => {
                const api = `https://api.qrserver.com/v1/create-qr-code/?size=${size*2}x${size*2}&data=${encodeURIComponent(url)}`;
                return (
                    <div className="flex flex-col items-center gap-1">
                        <div className={`bg-white p-1 rounded-lg shadow-md border ${isDark ? 'border-indigo-800' : 'border-slate-100'} hover:scale-110 transition-transform duration-300`}>
                            <img src={api} alt={label} style={{width: size, height: size}} className="rendering-pixelated" />
                        </div>
                        <p className={`text-[7px] font-black tracking-tighter ${isDark ? 'text-indigo-300' : 'text-slate-500'}`}>{label}</p>
                    </div>
                );
            };

            // 如果圖示加載失敗的後備渲染
            const IconWrapper = ({ Component, size, className }) => {
                return Component ? <Component size={size} className={className} /> : <div className={`bg-current rounded-sm ${className}`} style={{width: size, height: size, opacity: 0.2}} />;
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 overflow-hidden">
                    
                    <div className="mb-8 text-center animate-in fade-in duration-1000">
                        <div className="inline-flex items-center gap-2 bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-full mb-3 border border-indigo-200">
                           <IconWrapper Component={ShieldCheck} size={14} />
                           <span className="text-[10px] font-black uppercase tracking-widest">數位名片系統正式版</span>
                        </div>
                        <h1 className="text-2xl font-black text-slate-900 tracking-tight">西區公關組名片預覽</h1>
                    </div>

                    <div className="relative w-full max-w-[500px] h-[300px] perspective-1000">
                        <div 
                            onClick={() => setIsFlipped(!isFlipped)}
                            className={`relative w-full h-full transition-all duration-700 preserve-3d cursor-pointer ${isFlipped ? 'rotate-y-180' : ''}`}
                        >
                            {/* 正面 */}
                            <div className="absolute inset-0 backface-hidden bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 flex flex-col overflow-hidden">
                                <div className="h-4 bg-slate-900 w-full flex items-center px-4 gap-1">
                                    <div className="w-1.5 h-1.5 rounded-full bg-red-400"></div>
                                    <div className="w-1.5 h-1.5 rounded-full bg-amber-400"></div>
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-400"></div>
                                </div>
                                <div className="p-8 flex flex-col h-full relative">
                                    <div className="mb-6">
                                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-tight mb-2">TJC台灣傳教百年西區音樂會籌備會公關宣傳組</p>
                                        <h2 className="text-2xl font-black text-slate-900 tracking-tighter">西區教會傳教史數位典藏計畫</h2>
                                        <div className="h-1.5 w-12 bg-amber-500 mt-2 rounded-full"></div>
                                    </div>

                                    <div className="flex flex-grow gap-8 items-center">
                                        <div className="w-3/5">
                                            <div className="rounded-2xl border-2 border-slate-50 shadow-xl overflow-hidden bg-slate-50 relative aspect-video">
                                                <div className="absolute inset-0 p-2 flex flex-col">
                                                    <div className="flex items-center gap-1 mb-1 border-b pb-1 border-slate-200">
                                                        <IconWrapper Component={Globe} size={10} className="text-indigo-400" />
                                                        <div className="h-1.5 w-24 bg-slate-200 rounded-full"></div>
                                                    </div>
                                                    <div className="flex-grow flex items-center justify-center opacity-10">
                                                        <IconWrapper Component={Monitor} size={48} className="text-indigo-900" />
                                                    </div>
                                                </div>
                                                <div className="absolute bottom-2 left-2 right-2 bg-indigo-950 p-2.5 rounded-xl shadow-lg flex items-center gap-2">
                                                    <IconWrapper Component={ExternalLink} size={10} className="text-indigo-300" />
                                                    <span className="text-[7px] text-white font-black truncate">TJC-West-History 數位典藏系統</span>
                                                </div>
                                            </div>
                                            <p className="mt-3 text-[10px] font-bold text-slate-400 leading-relaxed italic">
                                                掃描 QR Code 進入網頁上傳各教會成立教會珍貴史料，共同見證百年恩典。
                                            </p>
                                        </div>
                                        <div className="w-2/5 flex flex-col items-center justify-center border-l border-slate-100 pl-4">
                                            <QRCodeItem url={qrLinks.upload} label="計畫網站" size={90} />
                                            <div className="mt-3 bg-slate-900 px-4 py-1.5 rounded-xl text-white text-[8px] font-black uppercase tracking-widest shadow-lg">
                                                Scan to Upload
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 背面 */}
                            <div className="absolute inset-0 backface-hidden rotate-y-180 bg-indigo-950 rounded-[2.5rem] shadow-2xl border border-indigo-900 flex flex-col text-white overflow-hidden">
                                <div className="p-8 flex flex-col h-full">
                                    <div className="flex justify-between items-center mb-8 bg-white/5 p-6 rounded-[2rem] border border-white/10 shadow-inner">
                                        <div className="flex items-center gap-4">
                                            <div className="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-xl border-2 border-white/20">
                                                <IconWrapper Component={User} size={32} className="text-white" />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-indigo-300 tracking-[0.2em] uppercase mb-1">公關宣傳組 組長</p>
                                                <h4 className="text-2xl font-black tracking-tight leading-none">王鴻志 <span className="text-xs font-normal opacity-30 ml-1 italic">Leader</span></h4>
                                            </div>
                                        </div>
                                        <QRCodeItem url={qrLinks.leader} label="組長 LINE" size={55} isDark />
                                    </div>

                                    <div className="text-center mb-6 flex items-center justify-center gap-3">
                                        <div className="h-px w-10 bg-indigo-800"></div>
                                        <p className="text-[10px] font-black text-indigo-400 tracking-[0.3em] uppercase">各小區公關小編聯絡網</p>
                                        <div className="h-px w-10 bg-indigo-800"></div>
                                    </div>

                                    <div className="grid grid-cols-4 gap-4 flex-grow items-center">
                                        <QRCodeItem url={qrLinks.ty} label="復興小區 錦琇" size={48} isDark />
                                        <QRCodeItem url={qrLinks.hc} label="竹苗小區 家欣" size={48} isDark />
                                        <QRCodeItem url={qrLinks.tc} label="中苗小區 家心" size={48} isDark />
                                        <QRCodeItem url={qrLinks.nt} label="南投小區 米路" size={48} isDark />
                                    </div>

                                    <div className="mt-4 pt-4 border-t border-white/5 flex justify-between items-center opacity-30">
                                        <p className="text-[7px] font-bold tracking-[0.2em] uppercase">© 2026 TJC WEST DISTRICT CENTENNIAL</p>
                                        <IconWrapper Component={Shield} size={12} className="text-white" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button 
                        onClick={() => setIsFlipped(!isFlipped)}
                        className="mt-12 flex items-center gap-3 bg-white text-indigo-900 px-10 py-4 rounded-full font-black shadow-2xl hover:bg-indigo-50 transition-all active:scale-95 border border-slate-200"
                    >
                        <IconWrapper Component={RefreshCw} size={20} className={isFlipped ? 'rotate-180 transition-transform duration-500' : ''} />
                        翻轉名片面
                    </button>

                    <div className="mt-8 text-center text-slate-400 text-[10px] font-black tracking-widest uppercase animate-pulse">
                        Click the card to flip
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
