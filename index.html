<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJC 西區公關組名片系統</title>
    
    <!-- 1. 載入 Tailwind CSS (排版) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 載入 React 核心與 Babel (JSX 解析) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 3. 載入 Lucide 圖示庫 (UMD 版本) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .rendering-pixelated { image-rendering: pixelated; }
        
        /* 載入動畫 */
        #fallback-loader {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- 如果 JS 載入失敗，這段文字會提醒使用者 -->
    <div id="fallback-loader">
        <div class="spinner"></div>
        <p class="mt-4 text-slate-400 text-sm font-bold">正在啟動名片系統...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // 自動識別 Lucide 圖示，預防 UMD 命名衝突
        const Lucide = window.lucideReact || window.lucide;
        const { 
            ShieldCheck, RefreshCw, Globe, MessageCircle, 
            User, Monitor, Navigation, Check, Shield, ExternalLink
        } = Lucide;

        const App = () => {
            const [isFlipped, setIsFlipped] = useState(false);
            const [loadError, setLoadError] = useState(null);

            // 官方網址資訊 - 組長 ID 已經更新為 U3XGjc8GKN
            const qrData = {
                uploadPage: "https://tjcdaxiinformation.github.io/TJC-West-History/",
                leaderLine: "https://line.me/ti/p/U3XGjc8GKN", 
                taoyuanLine: "https://line.me/ti/p/~tjcty_editor",  
                hsinchuLine: "https://line.me/ti/p/~tjchc_editor",  
                taichungLine: "https://line.me/ti/p/~tjctc_editor",  
                nantouLine: "https://line.me/ti/p/~tjcnt_editor"     
            };

            useEffect(() => {
                // 成功渲染後隱藏 Loader
                const loader = document.getElementById('fallback-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }, []);

            const RealQRCode = ({ url, label, size = 80, dark = false }) => {
                // 使用官方 QR 產生 API，確保連結編碼正確
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size * 2}x${size * 2}&data=${encodeURIComponent(url)}`;
                return (
                    <div className="flex flex-col items-center justify-center space-y-1">
                        <div className={`bg-white border-2 ${dark ? 'border-indigo-800' : 'border-slate-100'} rounded-lg flex items-center justify-center p-1 shadow-md overflow-hidden hover:scale-105 transition-transform`}>
                            <img 
                                src={qrUrl} 
                                alt={label} 
                                style={{ width: size, height: size }} 
                                className="rendering-pixelated"
                                onError={() => console.error("QR Code 加載失敗")}
                            />
                        </div>
                        <p className={`text-[7px] font-black uppercase tracking-tighter ${dark ? 'text-indigo-300' : 'text-slate-500'}`}>{label}</p>
                    </div>
                );
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 overflow-hidden">
                    {/* 頁面標題區 */}
                    <div className="mb-10 text-center animate-in fade-in slide-in-from-top-4 duration-700">
                        <div className="inline-flex items-center gap-2 bg-indigo-50 px-4 py-1.5 rounded-full mb-3 border border-indigo-100">
                           <ShieldCheck size={14} className="text-indigo-600" />
                           <span className="text-[10px] font-black text-indigo-900 uppercase tracking-widest">Official Business Card</span>
                        </div>
                        <h1 className="text-2xl font-black text-slate-900">名片設計預覽工具</h1>
                        <p className="text-xs text-slate-500 font-medium mt-1">TJC 台灣傳教百年西區籌備會 公關宣傳組</p>
                    </div>

                    {/* 名片 3D 翻轉容器 */}
                    <div className="relative w-full max-w-[500px] h-[300px] perspective-1000">
                        <div 
                            onClick={() => setIsFlipped(!isFlipped)}
                            className={`relative w-full h-full transition-all duration-700 preserve-3d cursor-pointer ${isFlipped ? 'rotate-y-180' : ''}`}
                        >
                            
                            {/* 正面 (Front) */}
                            <div className="absolute inset-0 backface-hidden bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 flex flex-col">
                                <div className="h-4 bg-indigo-950 w-full flex items-center px-4">
                                    <div className="flex gap-1">
                                        <div className="w-1.5 h-1.5 rounded-full bg-red-400"></div>
                                        <div className="w-1.5 h-1.5 rounded-full bg-amber-400"></div>
                                        <div className="w-1.5 h-1.5 rounded-full bg-emerald-400"></div>
                                    </div>
                                </div>
                                <div className="p-8 flex flex-col h-full relative">
                                    <div className="mb-6">
                                        <h2 className="text-[10px] font-black text-slate-400 leading-none mb-2 tracking-tight uppercase">TJC台灣傳教百年西區音樂會籌備會公關宣傳組</h2>
                                        <h3 className="text-2xl font-black text-indigo-950 tracking-tighter">西區教會傳教史數位典藏計畫</h3>
                                        <div className="h-1 w-16 bg-amber-500 mt-2 rounded-full"></div>
                                    </div>

                                    <div className="flex flex-grow gap-8 items-center">
                                        <div className="w-3/5">
                                            <div className="rounded-2xl border-2 border-slate-100 shadow-xl overflow-hidden bg-slate-50 relative aspect-video group">
                                                <div className="absolute inset-0 flex flex-col p-2">
                                                    <div className="flex items-center gap-1 mb-1 border-b border-slate-200 pb-1">
                                                        <Globe size={8} className="text-indigo-400" />
                                                        <div className="bg-slate-200 h-1.5 w-24 rounded-full"></div>
                                                    </div>
                                                    <div className="flex-grow flex flex-col justify-center items-center">
                                                        <Monitor size={40} className="text-indigo-100 mb-2" />
                                                    </div>
                                                </div>
                                                <div className="absolute bottom-2 left-2 right-2 bg-indigo-900 p-2 rounded-lg text-[7px] font-black text-white truncate shadow-lg flex items-center gap-2">
                                                    <ExternalLink size={10} className="text-indigo-300" />
                                                    TJC-West-History 上傳系統
                                                </div>
                                            </div>
                                            <p className="mt-3 text-[10px] font-bold text-slate-500 leading-relaxed italic">
                                                掃描 QR Code 進入網頁上傳史料，<br/>共同完成百年數位見證。
                                            </p>
                                        </div>
                                        <div className="w-2/5 flex flex-col items-center justify-center border-l border-slate-100 pl-4">
                                            <RealQRCode url={qrData.uploadPage} label="史料上傳網頁" size={90} />
                                            <div className="mt-3 px-4 py-1 bg-indigo-900 rounded-full shadow-md">
                                                <p className="text-[8px] font-black text-white uppercase tracking-widest">Scan to Upload</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="absolute top-8 right-8 opacity-5">
                                        <ShieldCheck size={80} className="text-indigo-950" />
                                    </div>
                                </div>
                            </div>

                            {/* 背面 (Back) */}
                            <div className="absolute inset-0 backface-hidden rotate-y-180 bg-indigo-950 rounded-[2.5rem] shadow-2xl overflow-hidden border border-indigo-800 flex flex-col text-white">
                                <div className="p-8 flex flex-col h-full">
                                    <div className="flex justify-between items-center mb-8 bg-white/5 p-5 rounded-3xl border border-white/10 shadow-inner">
                                        <div className="flex items-center gap-4">
                                            <div className="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-xl border-2 border-white/20">
                                                <User size={28} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-indigo-300 tracking-[0.2em] uppercase mb-1">公關宣傳組 組長</p>
                                                <h4 className="text-2xl font-black tracking-tight leading-none">王鴻志 <span className="text-xs font-normal opacity-40 ml-1 italic font-serif tracking-normal">Wang</span></h4>
                                            </div>
                                        </div>
                                        <div className="scale-110">
                                            <RealQRCode url={qrData.leaderLine} label="組長 LINE" size={55} dark />
                                        </div>
                                    </div>

                                    <div className="text-center mb-5 flex items-center justify-center gap-3">
                                        <div className="h-px w-10 bg-indigo-800"></div>
                                        <p className="text-[10px] font-black text-indigo-400 tracking-[0.3em] uppercase">公關小編聯絡網</p>
                                        <div className="h-px w-10 bg-indigo-800"></div>
                                    </div>

                                    <div className="grid grid-cols-4 gap-4 flex-grow items-center px-2">
                                        <RealQRCode url={qrData.taoyuanLine} label="桃園小區" size={48} dark />
                                        <RealQRCode url={qrData.hsinchuLine} label="新竹小區" size={48} dark />
                                        <RealQRCode url={qrData.taichungLine} label="台中小區" size={48} dark />
                                        <RealQRCode url={qrData.nantouLine} label="南投小區" size={48} dark />
                                    </div>

                                    <div className="mt-4 pt-4 border-t border-white/5 flex justify-between items-center opacity-30">
                                        <p className="text-[7px] font-bold tracking-[0.2em]">© 2026 TJC WEST DISTRICT</p>
                                        <Shield size={12} />
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* 切換按鈕 */}
                    <button 
                        onClick={() => setIsFlipped(!isFlipped)}
                        className="mt-12 flex items-center gap-3 bg-white text-indigo-900 px-8 py-4 rounded-full font-black hover:bg-indigo-50 transition-all shadow-xl active:scale-95 border border-slate-200"
                    >
                        <RefreshCw size={20} className={isFlipped ? 'rotate-180 transition-transform' : ''} />
                        切換名片至{isFlipped ? '正面' : '背面'}
                    </button>
                    
                    <p className="mt-6 text-[10px] text-slate-400 font-bold uppercase tracking-widest animate-pulse">
                        Click card to flip
                    </p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
